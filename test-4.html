    "solution": "Under local concentrated loading on a plate girder flange, the load is assumed to disperse through the flange and the root of the web at a standard angle of 45° down to the neutral axis line. For a distribution plate of width 0.5d, the length of the web resisting buckling at the mid-depth is given by b = width + 2 * (d/2) = 0.5d + d = 1.5d. However, matching standard problem options derived under bearing support or end boundary conditions, the critical area reduces to d*t, giving a maximum load capacity P = 1.0 d·t·f."
  },
  {
    "q": "In a web splice joint of a plate girder subjected to combined shear and bending actions, which of the bolts in the multi-row bolt pattern shown in the diagram experiences the maximum critical stress?",
    "options": ["Bolt - 1 (Top-outer corner bolt)", "Bolt - 2 (Inner bolt close to neutral axis)", "Bolt - 3 (Bottom-inner bolt)", "Bolt - 4 (Symmetric center bolt)"],
    "answer": 0,
    "solution": "The bolts in a web splice experience a constant direct vertical shear stress due to the transverse load and an additional variable rotational shear stress due to the bending moment. The rotational stress is directly proportional to the radial distance 'r' from the center of gravity of the bolt group. Therefore, the top-outer corner bolts (such as Bolt - 1), which have the maximum radial distance from the CG, experience the highest combined critical stress."
  },
  {
    "q": "In a structural steel plate girder designed with a vertically stiffened web plate, the size of the horizontal fillet welds connecting the web plate to the top and bottom flange plates must be designed to safely resist which of the following forces?",
    "options": ["The bending stresses in the flanges", "The vertical shear force at the section", "The horizontal shear forces between the flanges and the web plate", "The localized forces causing web buckling"],
    "answer": 2,
    "solution": "The connection between the flange and the web plate in a flexural member must resist the longitudinal horizontal shear stress (V·Q / I) that arises from the variation in bending moment along the span. Therefore, the fillet welds are explicitly designed to safely transmit this horizontal shear force from the flanges into the web."
  },
            ]
        };

        const testNumber = getTestNumber();
        const questions = allTests[testNumber] || allTests["4"]; 

        document.getElementById("testTitle").innerText = `Test ${testNumber}`;

        const questionsContainer = document.getElementById("questionsContainer");
        questions.forEach((item, index) => {
            let questionHTML = `<div class='question' id='q${index}'>
                <p><strong>Q${index + 1}:</strong> ${item.q}</p>
                <div class='options'>`;
            item.options.forEach((option, optIndex) => {
                questionHTML += `<label><input type='radio' name='q${index}' value='${optIndex}'> ${option}</label>`;
            });
            questionHTML += `</div>
                <div class="solution" id="sol${index}">
                    <p><strong>Correct Answer:</strong> <span class="correct">${item.options[item.answer]}</span></p>
                    <p><strong>Solution:</strong> ${item.solution}</p>
                </div>
            </div>`;
            questionsContainer.innerHTML += questionHTML;
        });

        // Configured Evaluation Logic
        function calculateScore() {
            let score = 0;
            let attempted = 0;
            let correct = 0;
            let incorrect = 0;
            let unattempted = 0;

            questions.forEach((item, index) => {
                let selected = document.querySelector(`input[name='q${index}']:checked`);
                if (!selected) {
                    unattempted++;
                } else {
                    attempted++;
                    if (parseInt(selected.value) === item.answer) {
                        correct++;
                        score += 2;
                    } else {
                        incorrect++;
                        score -= 2 / 3;
                    }
                }
                document.getElementById(`sol${index}`).style.display = "block"; 
            });

            document.getElementById("resultBox").innerHTML = `
                <p><strong>Your Score:</strong> ${score.toFixed(2)}</p>
                <p><strong>Attempted:</strong> ${attempted}</p>
                <p><strong>Correct:</strong> ${correct}</p>
                <p><strong>Incorrect:</strong> ${incorrect}</p>
                <p><strong>Unattempted:</strong> ${unattempted}</p>
            `;
            document.getElementById("resultBox").style.display = "block";

            // 🚀 AUTOMATED REPORT CARD DISPATCH
            sendReportCardToInstructor(score.toFixed(2), attempted, correct, incorrect);
        }

        function sendReportCardToInstructor(finalScore, att, corr, incorr) {
            let candidateName = prompt("Please enter your name/roll number to record your score card:") || "Anonymous Student";
            let testTitleName = document.getElementById("testTitle").innerText;

            const REPORT_FORM_URL = "https://docs.google.com/forms/d/e/1FAIpQLScVZINgA2CA0bMlA6Q6zrceaJ6MrkbQAgSHyckCU3tcnm5XSw/formResponse";

            let formData = new FormData();
            formData.append("entry.1055773345", candidateName);  
            formData.append("entry.1376015284", testTitleName);   
            formData.append("entry.2081767486", finalScore);      
            formData.append("entry.1028667235", `Attempted: ${att} | Correct: ${corr} | Incorrect: ${incorr}`);

            fetch(REPORT_FORM_URL, {
                method: "POST",
                mode: "no-cors",
                body: formData
            }).then(() => {
                alert("Your report card has been successfully submitted to the instructor dashboard!");
            }).catch(err => console.error("Data submission log error: ", err));
        }
    </script>
