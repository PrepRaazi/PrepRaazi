                <p><strong>Q${index + 1}:</strong> ${item.q}</p>
                <div class='options'>`;
            item.options.forEach((option, optIndex) => {
                questionHTML += `<label><input type='radio' name='q${index}' value='${optIndex}'> ${option}</label>`;
            });
            questionHTML += `</div>
                <div class="solution" id="sol${index}">

                    <p><strong>Solution:</strong> ${item.solution}</p>
                </div>
            </div>`;
            questionsContainer.innerHTML += questionHTML;
        });

        function calculateScore() {
            let score = 0;
            let attempted = 0;
            let correct = 0;
            let incorrect = 0;
            let unattempted = 0;

            questions.forEach((item, index) => {
                let selected = document.querySelector(`input[name='q${index}']:checked`);
                if (!selected) {
                    unattempted++;
                } else {
                    attempted++;
                    if (parseInt(selected.value) === item.answer) {
                        correct++;
                        score += 2;
                    } else {
                        incorrect++;
                        score -= 2 / 3;
                    }
                }
                document.getElementById(`sol${index}`).style.display = "block"; // Show solution
            });

            document.getElementById("resultBox").innerHTML = `
                <p><strong>Your Score:</strong> ${score.toFixed(2)}</p>
                <p><strong>Attempted:</strong> ${attempted}</p>
                <p><strong>Correct:</strong> ${correct}</p>
                <p><strong>Incorrect:</strong> ${incorrect}</p>
                <p><strong>Unattempted:</strong> ${unattempted}</p>
            `;
            document.getElementById("resultBox").style.display = "block";
        }
