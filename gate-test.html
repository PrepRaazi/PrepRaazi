<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice Tests</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
            padding: 50px;
        }
        .container {
            max-width: 800px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.1);
        }
        h1 {
            color: #003366;
        }
        .test-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        .test-btn {
            display: block;
            background: #0073e6;
            color: white;
            padding: 15px;
            font-size: 18px;
            text-decoration: none;
            border-radius: 5px;
            transition: 0.3s;
        }
        .test-btn:hover {
            background: #005bb5;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Select a Practice Test</h1>
        <div class="test-list">
            <a href="test-1.html" class="test-btn">Test 1</a>
            <a href="test-2.html" class="test-btn">Test 2</a>
            <a href="test-3.html" class="test-btn">Test 3</a>
            <a href="#test-4.html" class="test-btn">Test 4</a>
            <a href="gate-test.html?test=5" class="test-btn">Test 5</a>
            <a href="gate-test.html?test=6" class="test-btn">Test 6</a>
            <a href="gate-test.html?test=7" class="test-btn">Test 7</a>
            <a href="gate-test.html?test=8" class="test-btn">Test 8</a>
            <a href="gate-test.html?test=9" class="test-btn">Test 9</a>
            <a href="gate-test.html?test=10" class="test-btn">Test 10</a>
        </div>
    </div>
</body>
</html>
