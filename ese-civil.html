<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrepRaazi - ESE Civil Mains</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .mains-container {
            width: 85%;
            margin: 30px auto;
        }
        .mains-hero {
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(to right, #003366, #0055aa);
            color: white;
            border-radius: 10px;
            margin-bottom: 30px;
        }
        .mains-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .test-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.1);
            border-top: 5px solid #003366;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .test-card h3 {
            margin-top: 0;
            color: #003366;
            border-bottom: 1px solid #ddd;
            padding-bottom: 10px;
        }
        .action-links {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 15px;
        }
        .btn-mains {
            display: block;
            text-align: center;
            padding: 10px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 5px;
            font-size: 0.95rem;
            transition: background 0.3s, transform 0.1s;
        }
        .btn-mains:active {
            transform: scale(0.98);
        }
        .download-btn {
            background-color: #0073e6;
            color: white;
        }
        .download-btn:hover { background-color: #005bb5; }

        .upload-btn {
            background-color: #28a745;
            color: white;
        }
        .upload-btn:hover { background-color: #218838; }

        .evaluated-btn {
            background-color: #ffcc00;
            color: #003366;
        }
        .evaluated-btn:hover { background-color: #e6b800; }
        
        .disabled-btn {
            background-color: #e0e0e0;
            color: #888888;
            pointer-events: none;
            cursor: not-allowed;
        }
    </style>
</head>

<header>
    <div class="logo-container">
        <img src="Logo.jpeg" alt="PrepRaazi Logo">
        <h1>PrepRaazi</h1>
    </div>
    <nav>
