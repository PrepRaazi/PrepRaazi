<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrepRaazi - GATE Tests</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .gate-container { width: 85%; margin: 30px auto; }
        .hero {
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(to right, #003366, #0055aa);
            color: white;
            border-radius: 10px;
            margin-bottom: 30px;
        }
        .test-section-title {
            color: #003366;
            margin-top: 20px;
            border-bottom: 2px solid #003366;
            padding-bottom: 5px;
        }
        .test-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .test-card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.1);
            border-top: 4px solid #0073e6;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .test-card h3 { margin: 0 0 10px 0; color: #333; }
        .test-card p { font-size: 0.85rem; color: #666; margin-bottom: 15px; }
        .start-btn {
            display: block;
            background: #0073e6;
            color: white;
            padding: 10px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 5px;
            transition: 0.3s;
        }
        .start-btn:hover { background: #005bb5; }
    </style>
</head>
<body>

<header>
    <div class="logo-container">
        <img src="Logo.jpeg" alt="PrepRaazi Logo">
        <h1>PrepRaazi</h1>
    </div>
    <nav>
        <a href="index.html">Home</a>
        <a href="gate.html" class="active">GATE Test</a>
        <a href="ese-civil.html">ESE Civil</a>
        <a href="ese-general.html">ESE General</a>
        <a href="syllabus.html">Syllabus</a>
    </nav>
</header>

<main class="gate-container">
    <section class="hero">
        <h1>GATE Civil Engineering Portal</h1>
        <p>📚 Access targeted topic-wise assessments and weekly scheduled mock tests instantly.</p>
    </section>

    <h2 class="test-section-title">📝 Topic-Wise & Weekly Mock Tests</h2>
    <div class="test-grid" id="staticTestsGrid"></div>
</main>

<footer>
    <p>&copy; 2025 PrepRaazi. All Rights Reserved.</p>
</footer>

<script>
    const testList = [
        { id: 1, name: "Test 1", desc: "General Civil Engineering Assessment", file: "test-1.html" },
        { id: 2, name: "Test 2", desc: "Subject Wise: Plastic Analysis Special", file: "test-2.html" },
        { id: 3, name: "Test 3", desc: "Weekly: Hydrology + Plastic Analysis + Steel", file: "test-3.html" },
        { id: 4, name: "Test 4", desc: "Mock Assessment Series 4", file: "gate-test.html?test=4" },
        { id: 5, name: "Test 5", desc: "Mock Assessment Series 5", file: "gate-test.html?test=5" },
        { id: 6, name: "Test 6", desc: "Mock Assessment Series 6", file: "gate-test.html?test=6" },
        { id: 7, name: "Test 7", desc: "Mock Assessment Series 7", file: "gate-test.html?test=7" },
        { id: 8, name: "Test 8", desc: "Mock Assessment Series 8", file: "gate-test.html?test=8" },
        { id: 9, name: "Test 9", desc: "Mock Assessment Series 9", file: "gate-test.html?test=9" },
        { id: 10, name: "Test 10", desc: "Mock Assessment Series 10", file: "gate-test.html?test=10" }
    ];

    document.addEventListener("DOMContentLoaded", function() {
        const grid = document.getElementById("staticTestsGrid");
        testList.forEach(t => {
            grid.innerHTML += `
                <div class="test-card">
                    <h3>${t.name}</h3>
                    <p>${t.desc}</p>
                    <a href="${t.file}" class="start-btn">Start Test</a>
                </div>
            `;
        });
    });
</script>
</body>
</html>
