<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test 2 - Plastic Analysis</title>
    <style>
        body { font-family: Arial, sans-serif; }
        .container { width: 80%; margin: auto; }
        .question { margin-bottom: 15px; padding: 10px; border-bottom: 1px solid #ddd; }
        .options label { display: block; }
        .submit-btn { margin-top: 20px; padding: 10px; background: blue; color: white; border: none; cursor: pointer; }
        .result { margin-top: 20px; padding: 10px; border: 1px solid black; display: none; }
        .solution { display: none; margin-top: 10px; padding: 10px; background: #f8f8f8; border-left: 4px solid green; }
        .correct { color: green; font-weight: bold; }
        .incorrect { color: red; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h2 id="testTitle">Test 2</h2>
        <form id="gateTestForm">
            <div id="questionsContainer"></div>
            <button type="button" class="submit-btn" onclick="calculateScore()">Submit</button>
        </form>
        <div class="result" id="resultBox"></div>
    </div>

    <script>
        // Function to get test number from URL, defaulting to test 2
        function getTestNumber() {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get("test") || "2"; 
        }

        // Define questions for different tests
        const allTests = {
            "2": [
                {
                    "q": "At which axis does the neutral axis lie when a cross-section is fully yielded into its plastic zone?",
                    "options": ["Centroidal axis", "Equal area axis", "Symmetrical axis", "Eccentric axis"],
                    "answer": 1,
                    "solution": "In the fully plastic state, the tension force must equal the compression force, which splits the cross-section into two equal areas."
                },
                {
                    "q": "What is the shape factor for a standard rectangular cross-section?",
                    "options": ["1.12", "1.50", "1.70", "2.00"],
                    "answer": 1,
                    "solution": "The shape factor of a rectangular cross-section is exactly 1.50, calculated as the ratio of the plastic section modulus to the elastic section modulus."
                },
                {
                    "q": "For a simply supported beam of length L carrying a concentrated load at mid-span, what is the expression for plastic hinge length ($L_p$)?",
                    "options": ["L(1 - 1/SF)", "L*sqrt(1 - 1/SF)", "L(1 - sqrt(SF))", "L / SF"],
                    "answer": 0,
                    "solution": "The bending moment diagram varies linearly for a central point load, yielding a plastic hinge length proportional to (1 - 1/SF)."
                },
                {
                    "q": "Why is plastic design generally not suggested for statically determinate structures?",
                    "options": [
                        "Because they cannot undergo any plastic deformation before failure.",
                        "Because the formation of a single plastic hinge turns a determinate structure into an unstable mechanism.",
                        "Because their shape factor is always less than one.",
                        "Because they carry zero shear force at collapse."
                    ],
                    "answer": 1,
                    "solution": "Statically determinate structures have zero redundancy ($r = 0$), meaning a single plastic hinge causes immediate collapse without moment redistribution."
                },
                {
                    "q": "Which of the following correctly describes the Static or Lower Bound Theorem?",
                    "options": [
                        "The collapse load calculated satisfies the mechanism and continuity conditions, yielding W >= W_u.",
                        "The collapse load calculated satisfies the equilibrium and yield conditions, yielding W <= W_u.",
                        "The collapse load satisfies all three conditions simultaneously, yielding W = W_u.",
                        "The collapse load depends solely on the ductility and shape factor of the cross-section."
                    ],
                    "answer": 1,
                    "solution": "The lower bound theorem states that any load system satisfying equilibrium and not violating the yield condition is less than or equal to the true collapse load."
                },
                {
                    "q": "What is the shape factor for a solid circular cross-section?",
                    "options": ["1.50", "1.70", "1.27", "2.34"],
                    "answer": 1,
                    "solution": "A solid circle has a shape factor of approximately 1.70 due to its specific geometric mass distribution."
                },
                {
                    "q": "What is the recommended design load factor for the combination: Dead Load + Wind Load/Earthquake Load + Imposed Load (DL + WL/EL + IL)?",
                    "options": ["1.7", "1.5", "1.3", "2.0"],
                    "answer": 2,
                    "solution": "The reduced load factor is taken as 1.3 when multiple transient environmental loads occur concurrently with dead and live loads."
                },
                {
                    "q": "If a structure has a static redundancy of r, how many plastic hinges are required to develop a 'Complete Collapse' mechanism?",
                    "options": ["r", "r - 1", "r + 1", "r + 2"],
                    "answer": 2,
                    "solution": "A complete collapse mechanism occurs when exactly r + 1 hinges form, removing all redundant constraints and rendering the entire system unstable."
                },
                {
                    "q": "What is the formula to find the total number of independent mechanisms (n) in a frame or continuous beam?",
                    "options": ["n = N + r", "n = N - r", "n = r - N", "n = 2N - r"],
                    "answer": 1,
                    "solution": "The number of independent mechanisms equals the total possible plastic hinge locations (N) minus the degree of static redundancy (r)."
                },
                {
                    "q": "What is the ultimate collapse load ($w_u$) for a fixed beam of length L carrying a uniformly distributed load (UDL) with a plastic moment capacity of $M_p$?",
                    "options": ["8*M_p / L^2", "12*M_p / L^2", "16*M_p / L^2", "11.656*M_p / L^2"],
                    "answer": 2,
                    "solution": "By moment redistribution, a fixed beam under UDL forms three hinges at collapse (ends and mid-span), leading to w_u = 16*M_p / L^2."
                },
                {
                    "q": "Which basic analytical criterion represents the Yield Condition in plastic structural analysis?",
                    "options": [
                        "The sum of all external forces and internal moments must balance out to zero.",
                        "The bending moment at any cross-section must not exceed the full plastic moment capacity (M <= M_p).",
                        "A sufficient number of plastic hinges must form to transform the structure into a mechanism.",
                        "The internal virtual work done must be strictly greater than external work done."
                    ],
                    "answer": 1,
                    "solution": "The yield condition dictates that the internal bending moment at any point along the member cannot physically exceed its ultimate plastic moment capacity ($M_p$)."
                },
                {
                    "q": "How does the major axis shape factor of a standard structural steel I-section compare to its minor axis shape factor?",
                    "options": [
                        "The major axis shape factor is larger.",
                        "The minor axis shape factor is larger.",
                        "They are exactly equal.",
                        "They both always equal 1.50."
                    ],
                    "answer": 1,
                    "solution": "The major axis shape factor is around 1.12, whereas the minor axis is roughly 1.55, making the minor axis larger."
                },
                {
                    "q": "The Kinematic or Upper Bound Theorem satisfies which specific structural conditions?",
                    "options": [
                        "Equilibrium and Yield conditions",
                        "Equilibrium and Mechanism conditions",
                        "Yield and Uniqueness conditions",
                        "Mechanism and Yield conditions exclusively"
                    ],
                    "answer": 1,
                    "solution": "The kinematic method assumes a valid mechanism and applies virtual work, which inherently satisfies mechanism compatibility and equilibrium."
                },
                {
                    "q": "What does the 'Reserve Strength' ($\\Psi$) parameter represent in the redistribution of moments for a beam?",
                    "options": [
                        "The ratio of the elastic section modulus to the plastic section modulus.",
                        "The ratio of the ultimate collapse load to the initial yield load (w_u / w_y).",
                        "The absolute maximum curvature possible before strain hardening occurs.",
                        "The factor of safety divided by the shape factor."
                    ],
                    "answer": 1,
                    "solution": "Reserve strength measures the capacity of a redundant structure to carry additional load between first yielding and total collapse ($\\Psi = w_u / w_y$)."
                },
                {
                    "q": "Which cross-sectional profile exhibits the highest shape factor?",
                    "options": ["Rectangular section", "Triangular section (vertex up)", "Solid circular section", "Diamond section"],
                    "answer": 1,
                    "solution": "A triangular cross-section features a very high shape factor of 2.34 because much of its area is situated close to its base relative to its centroid."
                },
                {
                    "q": "In plastic design, when a section undergoes 'perfectly plastic' deformation up to the strain hardening zone, how does the maximum curvature change during this phase?",
                    "options": [
                        "It increases linearly with the bending moment.",
                        "It remains completely constant while the moment increases.",
                        "It becomes theoretically infinite at a constant plastic moment ($M_p$).",
                        "It decreases as the plastic hinge length stabilizes."
                    ],
                    "answer": 2,
                    "solution": "In the perfectly plastic plateau, the cross-section undergoes infinite rotation/curvature at a constant restraining moment equal to $M_p$ before strain hardening begins."
                },
                {
                    "q": "For a diamond (rhombus) cross-section, the shape factor is 2.00. What does this value physically imply about the section's capacity?",
                    "options": [
                        "Its elastic moment capacity is twice its plastic moment capacity.",
                        "It has a 100% reserve capacity beyond its initial elastic limit ($M_p = 2.0 \\cdot M_y$).",
                        "It will form two plastic hinges simultaneously under any load setup.",
                        "It is twice as efficient as an I-section when bending about the major axis."
                    ],
                    "answer": 1,
                    "solution": "Since the shape factor equals $M_p / M_y = 2.00$, the ultimate plastic moment capacity is exactly double the moment required to reach first structural yield."
                },
                {
                    "q": "Consider a simply supported beam of length L carrying a uniformly distributed load w. If the shape factor is SF, what is the exact formula for the plastic hinge length ($L_p$) at collapse?",
                    "options": [
                        "L(1 - 1/SF)",
                        "L*sqrt(1 - 1/SF)",
                        "L(1 - sqrt(1/SF))",
                        "(L/2)*(1 - 1/SF)"
                    ],
                    "answer": 1,
                    "solution": "Because a UDL produces a parabolic bending moment diagram, solving for the zone where the bending moment exceeds the yield moment produces a square-root relationship involving the shape factor."
                },
                {
                    "q": "Why does a standard structural steel I-section have a much lower major-axis shape factor (~1.12) compared to its minor-axis shape factor (~1.55)?",
                    "options": [
                        "The web carries all the nominal bending moment about the minor axis.",
                        "About the major axis, most of the material (flanges) is already located far from the neutral axis, minimizing the difference between the plastic and elastic section moduli.",
                        "The elastic neutral axis shifts significantly away from the equal area axis during major axis bending.",
                        "Plastic hinges cannot fully form along the minor axis due to early local buckling limits."
                    ],
                    "answer": 1,
                    "solution": "The shape factor measures area distribution; when mass is concentrated heavily at the extreme fibers (like flanges in major-axis bending), the elastic section modulus is already highly optimized, leaving less reserve plastic capacity."
                },
                {
                    "q": "What does the Uniqueness Theorem state regarding a collapsing structure?",
                    "options": [
                        "The collapse load is strictly bounded below by the kinematic method.",
                        "A unique collapse load is achieved if and only if the equilibrium, yield, and mechanism conditions are satisfied simultaneously.",
                        "The number of independent mechanisms must exactly equal the number of redundancies.",
                        "Every cross-section must reach its strain-hardening zone at the exact same instant."
                    ],
                    "answer": 1,
                    "solution": "The Uniqueness Theorem establishes that if a calculated load satisfies all three fundamental criteria (equilibrium, yield, and mechanism), it represents the true, exact collapse load."
                },
                {
                    "q": "If a cross-section has a compression area $A_1$ with a centroid distance $\\bar{y}_1$ and a tension area $A_2$ with a centroid distance $\\bar{y}_2$ from the equal area axis, what is the proper expression for the plastic section modulus ($Z_p$)?",
                    "options": [
                        "((A_1 + A_2) / 2) * (\\bar{y}_1 + \\bar{y}_2)",
                        "A_1*\\bar{y}_1 + A_2*\\bar{y}_2 = (A / 2) * (\\bar{y}_1 + \\bar{y}_2)",
                        "A * ((\\bar{y}_1 + \\bar{y}_2) / 2)^2",
                        "(f_y / 2) * (A_1*\\bar{y}_1 + A_2*\\bar{y}_2)"
                    ],
                    "answer": 1,
                    "solution": "Since $A_1 = A_2 = A/2$ at the plastic neutral axis, factoring out the area terms gives the combined first moment of area as $(A/2) \\cdot (\\bar{y}_1 + \\bar{y}_2)$."
                },
                {
                    "q": "In moment redistribution, a propped cantilever beam under a UDL has an ultimate collapse load of $11.656 \\cdot M_p / L^2$. At what load threshold does the very first plastic hinge form?",
                    "options": [
                        "8 * M_p / L^2",
                        "12 * M_p / L^2",
                        "16 * M_p / L^2",
                        "11.656 * M_y / L^2"
                    ],
                    "answer": 1,
                    "solution": "The first plastic hinge forms at the fixed support when the elastic support moment reaches $M_p$, which occurs at an elastic load value of $12 \\cdot M_p / L^2$."
                },
                {
                    "q": "A frame structure has r static redundancies and N possible plastic hinge locations. If a selected mechanism yields an over-complete collapse criteria where the number of actual hinges is greater than r + 1, what does this mean physically?",
                    "options": [
                        "The structure is still completely stable and can carry more load.",
                        "Two or more independent mechanisms correspond to the true collapse load simultaneously.",
                        "The structural geometry was modeled with incorrect boundary connections.",
                        "The load calculated represents a strict lower bound."
                    ],
                    "answer": 1,
                    "solution": "An over-complete collapse condition implies that multiple localized or distinct failure mechanisms happen to collapse at the exact same load parameter."
                },
                {
                    "q": "When applying the Principle of Virtual Work to a collapse mechanism, the internal work is calculated as $\\Sigma (M_p \\cdot \\theta)$. What does $\\theta$ strictly represent?",
                    "options": [
                        "The elastic rotation of the beam segment before yielding.",
                        "The total curvature of the member divided by its length.",
                        "The relative plastic rotation occurring at the localized plastic hinge.",
                        "The rigid body displacement of the concentrated load point."
                    ],
                    "answer": 2,
                    "solution": "Internal energy in plastic mechanisms is absorbed entirely by the concentrated plastic rotations ($\\theta$) taking place at the localized hinge points."
                },
                {
                    "q": "Why does the presence of a high shear force at a section theoretically reduce its plastic moment capacity ($M_p$)?",
                    "options": [
                        "High shear force shifts the neutral axis away from the equal area location.",
                        "Shear stress occupies a portion of the material's yield strength, leaving less normal stress capacity available to resist bending.",
                        "Shear force prevents the material from entering the strain-hardening region.",
                        "It forces the plastic hinge length ($L_p$) to drop to zero instantly."
                    ],
                    "answer": 1,
                    "solution": "Under combined loading criteria, shear stresses interact with normal stresses; high shear reduces the maximum allowable normal stress, lowering the available moment capacity."
                },
                {
                    "q": "For a continuous beam with three spans carrying individual loads, how do you determine the overall collapse load of the entire system?",
                    "options": [
                        "Take the average collapse load of all three individual spans.",
                        "Take the maximum collapse load among the three spans.",
                        "Take the minimum collapse load among the individual spans.",
                        "Sum up the collapse loads of all spans together."
                    ],
                    "answer": 2,
                    "solution": "The continuous system will experience structural failure as soon as its weakest span forms a localized mechanism, making the minimum individual span capacity the governing value."
                },
                {
                    "q": "What does a load factor of 1.3 for the combination (DL + WL/EL + IL) imply compared to a factor of 1.7 for (DL + IL)?",
                    "options": [
                        "Wind and earthquake forces are completely unpredictable and require less safety margin.",
                        "There is a lower probability that full design wind/earthquake loads and peak live loads will act simultaneously.",
                        "Structures become more ductile when subjected to lateral loads.",
                        "Material yield stress increases under dynamic wind conditions."
                    ],
                    "answer": 1,
                    "solution": "Standard structural probability limits permit a reduced combined load factor because it is highly unlikely that multiple independent transient loads will reach their peaks concurrently."
                },
                {
                    "q": "In a structural joint where four distinct frame members meet rigidly, what is the maximum number of plastic hinges that can form at that individual joint without collapsing it immediately?",
                    "options": ["1", "2", "3", "4"],
                    "answer": 2,
                    "solution": "To maintain structural connectivity at a rigid joint connecting m members, at least one member must remain unhinged to transfer stable moments, limiting the hinges to m - 1."
                },
                {
                    "q": "The Kinematic (Upper Bound) Theorem states that the calculated load W is greater than or equal to the true collapse load $W_u$. What must a designer do to find the true collapse load using this approach?",
                    "options": [
                        "Look for the mechanism that gives the highest possible value of W.",
                        "Find the load that keeps the bending moment diagram completely below $M_p$.",
                        "Analyze all possible valid mechanisms and identify the minimum calculated load.",
                        "Integrate the plastic section modulus along the entire span."
                    ],
                    "answer": 2,
                    "solution": "Because the kinematic method yields values that overestimate or match the structural capacity, the lowest upper bound among all mechanisms represents the exact collapse load."
                },
                {
                    "q": "Under the criteria for plastic analysis, if a postulated mechanism satisfies equilibrium and mechanism conditions, but the internal bending moment at an unhinged section is found to be $1.2 \\cdot M_p$, what does this indicate about your calculated load?",
                    "options": [
                        "It is the true collapse load.",
                        "It is a lower bound estimate ($W \\le W_u$).",
                        "It is an upper bound estimate ($W \\ge W_u$) but needs to be lowered by checking other mechanisms.",
                        "The structure is in a state of stable elastic equilibrium."
                    ],
                    "answer": 2,
                    "solution": "Violating the yield criterion ($M > M_p$) indicates that the mechanism method overpredicted the internal structural capacity, confirming that the load behaves as an upper bound."
                }
            ]
        };

        const testNumber = getTestNumber();
        const questions = allTests[testNumber] || allTests["2"]; // Default to Test 2 if not found

        document.getElementById("testTitle").innerText = `Test ${testNumber}`;

        const questionsContainer = document.getElementById("questionsContainer");
        questions.forEach((item, index) => {
            let questionHTML = `<div class='question' id='q${index}'>
                <p><strong>Q${index + 1}:</strong> ${item.q}</p>
                <div class='options'>`;
            item.options.forEach((option, optIndex) => {
                questionHTML += `<label><input type='radio' name='q${index}' value='${optIndex}'> ${option}</label>`;
            });
            questionHTML += `</div>
                <div class="solution" id="sol${index}">
                    <p><strong>Correct Answer:</strong> <span class="correct">${item.options[item.answer]}</span></p>
                    <p><strong>Solution:</strong> ${item.solution}</p>
                </div>
            </div>`;
            questionsContainer.innerHTML += questionHTML;
        });

        // Updated Evaluation & Submission Block
        function calculateScore() {
            let score = 0;
            let attempted = 0;
            let correct = 0;
            let incorrect = 0;
            let unattempted = 0;

            questions.forEach((item, index) => {
                let selected = document.querySelector(`input[name='q${index}']:checked`);
                if (!selected) {
                    unattempted++;
                } else {
                    attempted++;
                    if (parseInt(selected.value) === item.answer) {
                        correct++;
                        score += 2;
                    } else {
                        incorrect++;
                        score -= 2 / 3;
                    }
                }
                document.getElementById(`sol${index}`).style.display = "block"; 
            });

            document.getElementById("resultBox").innerHTML = `
                <p><strong>Your Score:</strong> ${score.toFixed(2)}</p>
                <p><strong>Attempted:</strong> ${attempted}</p>
                <p><strong>Correct:</strong> ${correct}</p>
                <p><strong>Incorrect:</strong> ${incorrect}</p>
                <p><strong>Unattempted:</strong> ${unattempted}</p>
            `;
            document.getElementById("resultBox").style.display = "block";

            // 🚀 NEW AUTOMATED REPORT CARD DISPATCH SYSTEM
            sendReportCardToInstructor(score.toFixed(2), attempted, correct, incorrect);
        }

        function sendReportCardToInstructor(finalScore, att, corr, incorr) {
            let candidateName = prompt("Please enter your name/roll number to record your score card:") || "Anonymous Student";
            let testTitleName = document.getElementById("testTitle").innerText;

            // Corrected functional submission gateway
            const REPORT_FORM_URL = "https://docs.google.com/forms/d/e/1FAIpQLScVZINgA2CA0bMlA6Q6zrceaJ6MrkbQAgSHyckCU3tcnm5XSw/formResponse";

            let formData = new FormData();
            // Connected field entry numbers from live form
            formData.append("entry.1055773345", candidateName);  
            formData.append("entry.1376015284", testTitleName);   
            formData.append("entry.2081767486", finalScore);      
            formData.append("entry.1028667235", `Attempted: ${att} | Correct: ${corr} | Incorrect: ${incorr}`);

            fetch(REPORT_FORM_URL, {
                method: "POST",
                mode: "no-cors",
                body: formData
            }).then(() => {
                alert("Your report card has been successfully submitted to the instructor dashboard!");
            }).catch(err => console.error("Data submission log error: ", err));
        }
    </script>
	
    <script>
	// ==========================================
// PREPRAAZI AUTOMATED EXAM CONTROLLER MODULE
// ==========================================
(function() {
    // 1. Inject the Sticky Timer Header CSS Styles Dynamically
    const styles = `
        body { padding-top: 70px !important; }
        .test-header-bar {
            position: fixed; top: 0; left: 0; width: 100%; height: 60px;
            background-color: #003366; color: white; display: flex;
            justify-content: space-between; align-items: center;
            padding: 0 40px; box-sizing: border-box; z-index: 9999;
            box-shadow: 0px 3px 6px rgba(0,0,0,0.1); font-family: Arial, sans-serif;
        }
        .test-header-bar h2 { margin: 0; font-size: 1.3rem; }
        .timer-display {
            background-color: #ffcc00; color: #000; padding: 8px 16px;
            font-weight: bold; border-radius: 5px; font-size: 1.1rem;
        }
    `;
    const styleSheet = document.createElement("style");
    styleSheet.innerText = styles;
    document.head.appendChild(styleSheet);

    // 2. Inject the HTML Header Element Dynamically
    const currentTestNum = (typeof getTestNumber === "function") ? getTestNumber() : "1";
    const headerBar = document.createElement("div");
    headerBar.className = "test-header-bar";
    headerBar.innerHTML = `
        <h2>ESE Test Arena — Test ${currentTestNum}</h2>
        <div class="timer-display" id="dynamicTimerBox">Time Remaining: --:--</div>
    `;
    document.body.insertBefore(headerBar, document.body.firstChild);

    // 3. Initialize Global Tracking Flags and Time Metrics
    let timerInterval;
    let isExamSubmitted = false;
    let totalExamDurationSeconds = 0;
    let timeRemainingSeconds = 0;

    // 4. Set Up the Countdown Mechanism (Total Questions + 10 Minutes)
    function initTimer() {
        if (typeof questions === "undefined" || !Array.isArray(questions)) {
            console.error("PrepRaazi Engine Error: 'questions' array data block not located.");
            return;
        }

        const durationInMinutes = questions.length + 10;
        totalExamDurationSeconds = durationInMinutes * 60;
        timeRemainingSeconds = totalExamDurationSeconds;
        
        const timerBox = document.getElementById("dynamicTimerBox");

        timerInterval = setInterval(() => {
            if (timeRemainingSeconds <= 0) {
                clearInterval(timerInterval);
                timerBox.innerText = "Time Expired!";
                timerBox.style.backgroundColor = "#dc3545";
                timerBox.style.color = "white";
                processExamResults(true); 
            } else {
                timeRemainingSeconds--;
                let mins = Math.floor(timeRemainingSeconds / 60);
                let secs = timeRemainingSeconds % 60;
                timerBox.innerText = `Time Remaining: ${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            }
        }, 1000);
    }

    // Run timer initialization immediately or after DOM loads
    if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", initTimer);
    } else {
        initTimer();
    }

    // 5. Expose the submission function globally to override the button's onclick directly
    window.calculateScore = function() {
        if (isExamSubmitted) return;
        processExamResults(false);
    };

    function processExamResults(isTimeOutTrigger) {
        if (isExamSubmitted) return;
        isExamSubmitted = true;
        clearInterval(timerInterval);

        // Calculate Exact Time Taken
        let elapsedSeconds = totalExamDurationSeconds - timeRemainingSeconds;
        let takenMins = Math.floor(elapsedSeconds / 60);
        let takenSecs = elapsedSeconds % 60;
        let timeTakenString = `${takenMins}m ${takenSecs}s`;

        // Update timer box display status text
        const timerBox = document.getElementById("dynamicTimerBox");
        if (timerBox && !isTimeOutTrigger) {
            timerBox.innerText = "Exam Completed";
            timerBox.style.backgroundColor = "#28a745";
            timerBox.style.color = "white";
        }

        // Lock all inputs globally
        document.querySelectorAll("input[type='radio']").forEach(i => i.disabled = true);
        const submitBtn = document.querySelector(".submit-btn") || document.getElementById("mainSubmitBtn");
        if (submitBtn) {
            submitBtn.disabled = true;
            submitBtn.style.opacity = "0.5";
            submitBtn.style.cursor = "not-allowed";
        }

        let score = 0, attempted = 0, correct = 0, incorrect = 0, unattempted = 0;

        questions.forEach((item, index) => {
            let selected = document.querySelector(`input[name='q${index}']:checked`);
            if (!selected) {
                unattempted++;
            } else {
                attempted++;
                if (parseInt(selected.value) === item.answer) {
                    correct++;
                    score += 2;
                } else {
                    incorrect++;
                    score -= 2 / 3;
                }
            }
            const solBox = document.getElementById(`sol${index}`);
            if (solBox) solBox.style.display = "block"; 
        });

        const resultBox = document.getElementById("resultBox");
        if (resultBox) {
            resultBox.innerHTML = `
                <h3 style="color:#003366; margin-top:0;">${isTimeOutTrigger ? '⏱️ Time up! Exam Auto-Submitted.' : '📊 Exam Evaluation Summary'}</h3>
                <p><strong>Your Score:</strong> ${score.toFixed(2)}</p>
                <p><strong>Time Taken:</strong> ${timeTakenString}</p>
                <p><strong>Attempted:</strong> ${attempted}</p>
                <p><strong>Correct:</strong> ${correct}</p>
                <p><strong>Incorrect:</strong> ${incorrect}</p>
                <p><strong>Unattempted:</strong> ${unattempted}</p>
            `;
            resultBox.style.display = "block";
            resultBox.scrollIntoView({ behavior: 'smooth' });
        }

        // Prompt for student identity
        let candidateName = prompt("Exam finished! Please enter your name/roll number to record your scorecard:") || "Anonymous Student";
        let testTitleName = `Test ${currentTestNum}`;

        const REPORT_FORM_URL = "https://docs.google.com/forms/d/e/1FAIpQLScVZINgA2CA0bMlA6Q6zrceaJ6MrkbQAgSHyckCU3tcnm5XSw/formResponse";

        let formData = new FormData();
        formData.append("entry.1055773345", candidateName);  
        formData.append("entry.1376015284", testTitleName);   
        formData.append("entry.2081767486", score.toFixed(2));      
        formData.append("entry.1028667235", `Time Taken: ${timeTakenString} | Attempted: ${attempted} | Correct: ${correct} | Incorrect: ${incorrect}`);

        fetch(REPORT_FORM_URL, {
            method: "POST",
            mode: "no-cors",
            body: formData
        }).then(() => {
            alert("Your report card has been successfully submitted to the instructor dashboard!");
        }).catch(err => console.error("Data submission log error: ", err));
    }
})();
</script>
