    "answer": 0,
    "solution": "Compute the Earliest Finish (EF) times using a forward pass:\n- EF(A) = 8 days\n- EF(B) = 8 + 10 = 18 days\n- EF(C) = 8 + 6 = 14 days\n- EF(E) = 18 + 7 = 25 days\n- EF(D) = max[EF(B), EF(C)] + 12 = max[18, 14] + 12 = 18 + 12 = 30 days\n- EF(F) = 14 + 16 = 30 days\n- EF(G) = max[EF(E), EF(D), EF(F)] + 9 = max[25, 30, 30] + 9 = 30 + 9 = 39 days.\nThus, the total project duration is 39 days."
  },
  {
    "q": "In an Activity-on-Node (A-O-N) project network, dependencies are mapped between activities. Node 1 is the starting activity and connects directly to Node 2, Node 3, and Node 4. Node 2 connects to Node 5. Node 3 connects to Node 5 and Node 6. Node 4 connects to Node 6. Node 5 and Node 6 both connect directly to the terminal Node 7. If a separate direct dependency arrow is also drawn from Node 1 to Node 6, how many total links are redundant and can be deleted without altering network logic?",
    "options": ["None", "One", "Two", "Three"],
    "answer": 1,
    "solution": "A link is redundant if its dependency is already implicitly established through an alternative serial path. Let's analyze the direct link from Node 1 to Node 6:\n- Node 1 connects to Node 3, and Node 3 connects to Node 6.\n- This means Node 6 cannot start until Node 3 finishes, which in turn cannot start until Node 1 finishes.\n- Consequently, the directly drawn arrow from Node 1 to Node 6 is completely redundant and can be safely deleted. None of the other listed dependencies contain overlapping bypass routes, so exactly one link is deletable."
  }
            ]
        };

        const testNumber = getTestNumber();
        const questions = allTests[testNumber] || allTests["4"]; 

        document.getElementById("testTitle").innerText = `Test ${testNumber}`;

        const questionsContainer = document.getElementById("questionsContainer");
        questions.forEach((item, index) => {
            let questionHTML = `<div class='question' id='q${index}'>
                <p><strong>Q${index + 1}:</strong> ${item.q}</p>
                <div class='options'>`;
            item.options.forEach((option, optIndex) => {
                questionHTML += `<label><input type='radio' name='q${index}' value='${optIndex}'> ${option}</label>`;
            });
            questionHTML += `</div>
                <div class="solution" id="sol${index}">
                    <p><strong>Correct Answer:</strong> <span class="correct">${item.options[item.answer]}</span></p>
                    <p><strong>Solution:</strong> ${item.solution}</p>
                </div>
            </div>`;
            questionsContainer.innerHTML += questionHTML;
        });

        // Configured Evaluation Logic
        function calculateScore() {
            let score = 0;
            let attempted = 0;
            let correct = 0;
            let incorrect = 0;
            let unattempted = 0;

            questions.forEach((item, index) => {
                let selected = document.querySelector(`input[name='q${index}']:checked`);
                if (!selected) {
                    unattempted++;
                } else {
                    attempted++;
                    if (parseInt(selected.value) === item.answer) {
                        correct++;
                        score += 2;
                    } else {
                        incorrect++;
                        score -= 2 / 3;
                    }
                }
                document.getElementById(`sol${index}`).style.display = "block"; 
            });

            document.getElementById("resultBox").innerHTML = `
                <p><strong>Your Score:</strong> ${score.toFixed(2)}</p>
                <p><strong>Attempted:</strong> ${attempted}</p>
                <p><strong>Correct:</strong> ${correct}</p>
                <p><strong>Incorrect:</strong> ${incorrect}</p>
                <p><strong>Unattempted:</strong> ${unattempted}</p>
            `;
            document.getElementById("resultBox").style.display = "block";

            // 🚀 AUTOMATED REPORT CARD DISPATCH
            sendReportCardToInstructor(score.toFixed(2), attempted, correct, incorrect);
        }

        function sendReportCardToInstructor(finalScore, att, corr, incorr) {
            let candidateName = prompt("Please enter your name/roll number to record your score card:") || "Anonymous Student";
            let testTitleName = document.getElementById("testTitle").innerText;

            const REPORT_FORM_URL = "https://docs.google.com/forms/d/e/1FAIpQLScVZINgA2CA0bMlA6Q6zrceaJ6MrkbQAgSHyckCU3tcnm5XSw/formResponse";

            let formData = new FormData();
            formData.append("entry.1055773345", candidateName);  
            formData.append("entry.1376015284", testTitleName);   
            formData.append("entry.2081767486", finalScore);      
            formData.append("entry.1028667235", `Attempted: ${att} | Correct: ${corr} | Incorrect: ${incorr}`);

            fetch(REPORT_FORM_URL, {
                method: "POST",
                mode: "no-cors",
                body: formData
            }).then(() => {
                alert("Your report card has been successfully submitted to the instructor dashboard!");
            }).catch(err => console.error("Data submission log error: ", err));
        }
    </script>
